name: "Rechner-Fehler melden"
description: "Ein Rechner liefert ein falsches Ergebnis oder funktioniert nicht richtig"
title: "Fehler: "
labels: ["bug"]
body:
  - type: input
    id: rechner
    attributes:
      label: "Welcher Rechner?"
      description: "Name des Rechners (z.B. Kindergeld-Rechner, BMI-Rechner)"
      placeholder: "z.B. Brutto-Netto-Rechner"
    validations:
      required: true
  - type: textarea
    id: beschreibung
    attributes:
      label: "Was ist falsch?"
      description: "Beschreibe den Fehler so genau wie moeglich"
      placeholder: "z.B. Bei einem Bruttolohn von 4.000 EUR wird ein falscher Nettolohn angezeigt"
    validations:
      required: true
  - type: textarea
    id: erwartet
    attributes:
      label: "Erwartetes Ergebnis"
      description: "Was waere das korrekte Ergebnis?"
      placeholder: "z.B. Der Nettolohn sollte ca. 2.600 EUR betragen laut Finanzamt-Tabelle"
    validations:
      required: false
  - type: textarea
    id: quellen
    attributes:
      label: "Quellen"
      description: "Hast du eine offizielle Quelle die das korrekte Ergebnis belegt?"
      placeholder: "z.B. https://www.bmf-steuerrechner.de"
    validations:
      required: false
