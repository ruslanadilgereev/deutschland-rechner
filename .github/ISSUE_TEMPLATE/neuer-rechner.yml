name: "Neuen Rechner vorschlagen"
description: "Schlage einen neuen Rechner vor, der auf der Seite fehlt"
title: "Vorschlag: "
labels: ["enhancement"]
body:
  - type: input
    id: name
    attributes:
      label: "Name des Rechners"
      placeholder: "z.B. Pendlerpauschale-Rechner"
    validations:
      required: true
  - type: textarea
    id: beschreibung
    attributes:
      label: "Was soll der Rechner berechnen?"
      description: "Kurze Beschreibung der Funktionalität"
      placeholder: "z.B. Berechnet die Pendlerpauschale basierend auf Entfernung und Arbeitstagen"
    validations:
      required: true
  - type: dropdown
    id: kategorie
    attributes:
      label: "Kategorie"
      options:
        - "Familie & Kinder"
        - "Arbeit & Gehalt"
        - "Steuern & Abgaben"
        - "Sozialleistungen"
        - "Wohnen & Immobilien"
        - "Gesundheit"
        - "Auto & Mobilität"
        - "Finanzen & Kredit"
        - "Alltag & Lifestyle"
    validations:
      required: true
  - type: textarea
    id: quellen
    attributes:
      label: "Quellen / Berechnungsgrundlage"
      description: "Offizielle Quellen oder Gesetze auf denen der Rechner basieren soll"
      placeholder: "z.B. https://www.gesetze-im-internet.de/estg/__9.html"
    validations:
      required: false
  - type: textarea
    id: sonstiges
    attributes:
      label: "Sonstiges"
      description: "Weitere Infos, z.B. warum der Rechner wichtig ist"
    validations:
      required: false
